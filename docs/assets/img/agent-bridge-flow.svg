<svg viewBox="118 45 495 360" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333333"/>
    </marker>
  </defs>

  <!-- ===== EDGES ===== -->

  <!-- Linear -> Bridge : webhook (solid) label left -->
  <path d="M 214 100 L 214 200" fill="none" stroke="#333333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="205" y="154" font-size="13" fill="#333333" text-anchor="end">webhook</text>

  <!-- Bridge -> Linear : GraphQL (dotted) label right -->
  <path d="M 246 200 L 246 100" fill="none" stroke="#333333" stroke-width="1.5" stroke-dasharray="2 4" marker-end="url(#arrow)"/>
  <text x="255" y="154" font-size="13" fill="#333333" text-anchor="start">GraphQL</text>

  <!-- Bridge -> clanker : ecs:RunTask (solid) label left -->
  <path d="M 214 240 L 214 360" fill="none" stroke="#333333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="205" y="304" font-size="13" fill="#333333" text-anchor="end">ecs:RunTask</text>

  <!-- clanker -> Bridge : hand back (dotted) label right -->
  <path d="M 246 360 L 246 240" fill="none" stroke="#333333" stroke-width="1.5" stroke-dasharray="2 4" marker-end="url(#arrow)"/>
  <text x="255" y="304" font-size="13" fill="#333333" text-anchor="start">hand back</text>

  <!-- clanker -> GitHub : open / update / merge PR (solid) -->
  <path d="M 314 375 C 400 362, 450 346, 495 326" fill="none" stroke="#333333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="405" y="392" font-size="13" fill="#333333" text-anchor="middle">open / update / merge PR</text>

  <!-- GitHub -> Bridge : webhook (solid) -->
  <path d="M 505 280 C 430 226, 360 214, 314 216" fill="none" stroke="#333333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="430" y="228" font-size="13" fill="#333333" text-anchor="middle">webhook</text>

  <!-- ===== NODES ===== -->

  <!-- Linear (external / lavender) -->
  <rect x="170" y="60" width="120" height="40" rx="8" fill="#ece7fb" stroke="#7c3aed" stroke-width="1"/>
  <text x="230" y="85" font-size="15" fill="#5b21b6" text-anchor="middle">Linear</text>

  <!-- Agent Bridge (resource / green) -->
  <rect x="158" y="200" width="144" height="40" rx="8" fill="#d5f0e8" stroke="#0f766e" stroke-width="1"/>
  <text x="230" y="225" font-size="15" fill="#134e4a" text-anchor="middle">Agent Bridge</text>

  <!-- clanker (resource / green) -->
  <rect x="170" y="360" width="120" height="40" rx="8" fill="#d5f0e8" stroke="#0f766e" stroke-width="1"/>
  <text x="230" y="385" font-size="15" fill="#134e4a" text-anchor="middle">clanker</text>

  <!-- GitHub (external / lavender) -->
  <rect x="460" y="280" width="120" height="40" rx="8" fill="#ece7fb" stroke="#7c3aed" stroke-width="1"/>
  <text x="520" y="305" font-size="15" fill="#5b21b6" text-anchor="middle">GitHub</text>
</svg>
